<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бронирование переговорок</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ==================== АВТОРИЗАЦИЯ ==================== -->
<div id="auth-section" class="shell auth-wrap" hidden>
  <div class="brand" style="margin-bottom:24px;">
    <span class="mark">RM</span>
    <h1>Переговорки</h1>
  </div>

  <div class="panel">
    <div class="tabs">
      <div class="tab active" data-tab="login">Вход</div>
      <div class="tab" data-tab="register">Регистрация</div>
    </div>

    <!-- Вход -->
    <form id="login-form">
      <div class="field">
        <label for="login-name">Имя</label>
        <select id="login-name" required>
          <option value="" disabled selected>Выберите себя из списка…</option>
        </select>
      </div>
      <div class="field">
        <label for="login-pin">PIN-код</label>
        <input id="login-pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
      <div class="error-text" id="login-error"></div>
    </form>

    <!-- Регистрация -->
    <form id="register-form" hidden>
      <div class="field">
        <label for="reg-name">Имя</label>
        <input id="reg-name" type="text" placeholder="Например, Азиз Каримов" required>
      </div>
      <div class="field">
        <label for="reg-dept">Отдел</label>
        <input id="reg-dept" type="text" placeholder="Например, Продажи" required>
      </div>
      <div class="field">
        <label for="reg-pin">Придумайте PIN-код (4–6 цифр)</label>
        <input id="reg-pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Зарегистрироваться</button>
      <div class="error-text" id="register-error"></div>
    </form>
  </div>

  <p class="hint" style="text-align:center; margin-top:16px;">
    Управление комнатами — в <a href="admin.html" class="link-btn" style="display:inline;">админ-панели</a>
  </p>
</div>

<!-- ==================== ОСНОВНОЕ ПРИЛОЖЕНИЕ ==================== -->
<div id="app-section" class="shell" hidden>
  <div class="topbar">
    <div class="brand">
      <span class="mark">RM</span>
      <h1>Переговорки</h1>
    </div>
    <div class="session">
      <span>Вы вошли как <strong id="session-name"></strong> <span class="badge" id="session-dept"></span></span>
      <button class="btn btn-ghost" id="logout-btn">Выйти</button>
    </div>
  </div>

  <div class="date-row">
    <label for="date-picker" style="margin:0; white-space:nowrap;">Дата:</label>
    <input type="date" id="date-picker">
    <span class="today-label" id="date-human"></span>
    <button class="btn btn-ghost" id="today-btn" style="margin-left:auto;">Сегодня</button>
  </div>

  <div id="rooms-container">
    <div class="empty">Загрузка комнат…</div>
  </div>
</div>

<!-- ==================== МОДАЛКА БРОНИРОВАНИЯ ==================== -->
<div class="overlay" id="booking-overlay" hidden>
  <div class="modal">
    <h3>Забронировать переговорку</h3>
    <div class="sub" id="booking-room-label"></div>

    <form id="booking-form">
      <div class="field-row">
        <div class="field">
          <label for="booking-start">Начало</label>
          <input type="time" id="booking-start" step="3600" required>
        </div>
        <div class="field">
          <label for="booking-end">Окончание</label>
          <input type="time" id="booking-end" step="3600" required>
        </div>
      </div>
      <div class="hint" style="margin-top:-8px; margin-bottom:14px;">Шаг по умолчанию — 1 час, но время можно ввести вручную с точностью до минуты.</div>

      <div class="field">
        <label for="booking-purpose">Цель встречи</label>
        <input type="text" id="booking-purpose" placeholder="Например, созвон с партнёром">
      </div>

      <div class="field">
        <label>Отдел</label>
        <input type="text" id="booking-dept" disabled>
      </div>

      <div class="error-text" id="booking-error"></div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="booking-cancel">Отмена</button>
        <button type="submit" class="btn btn-primary">Забронировать</button>
      </div>
    </form>
  </div>
</div>

<!-- ==================== МОДАЛКА ОТМЕНЫ БРОНИ ==================== -->
<div class="overlay" id="cancel-overlay" hidden>
  <div class="modal">
    <h3>Отменить бронь?</h3>
    <div class="sub" id="cancel-details"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancel-no">Оставить</button>
      <button type="button" class="btn btn-danger" id="cancel-yes">Отменить бронь</button>
    </div>
  </div>
</div>

<script src="assets/config.js"></script>
<script src="assets/common.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
